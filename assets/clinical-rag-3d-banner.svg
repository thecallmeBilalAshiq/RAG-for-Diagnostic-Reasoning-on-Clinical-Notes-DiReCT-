    <text x="42" y="28" fill="#BCEBFF" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700" letter-spacing="1.5">CLINICAL AI · RAG</text>

    <text x="0" y="118" fill="#F5FAFF" font-size="74" font-family="Inter,Segoe UI,Arial" font-weight="800" letter-spacing="-2">DiReCT</text>
    <text x="0" y="188" fill="url(#cyan)" font-size="52" font-family="Inter,Segoe UI,Arial" font-weight="800" letter-spacing="-1.2">Diagnostic Reasoning</text>
    <text x="0" y="248" fill="#D7E8F9" font-size="32" font-family="Inter,Segoe UI,Arial" font-weight="600">with Retrieval-Augmented Generation</text>

    <text x="0" y="310" fill="#9DB8D4" font-size="22" font-family="Inter,Segoe UI,Arial">Clinical-note retrieval using MiniLM + FAISS, grounded response</text>
    <text x="0" y="344" fill="#9DB8D4" font-size="22" font-family="Inter,Segoe UI,Arial">generation with FLAN-T5, and an interactive Gradio interface.</text>

    <g transform="translate(0 398)">
