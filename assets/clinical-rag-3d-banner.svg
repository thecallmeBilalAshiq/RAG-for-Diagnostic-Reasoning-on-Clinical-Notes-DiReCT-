      <text x="262" y="35" fill="#E8E3FF" font-size="19" font-family="Inter,Segoe UI,Arial" font-weight="700">FAISS</text>
      <rect x="344" width="120" height="54" rx="16" fill="#102F59" stroke="#66FFD1" stroke-opacity="0.38"/>
      <text x="366" y="35" fill="#DCFFF3" font-size="19" font-family="Inter,Segoe UI,Arial" font-weight="700">FLAN-T5</text>
      <rect x="480" width="104" height="54" rx="16" fill="#102F59" stroke="#55DFFF" stroke-opacity="0.35"/>
      <text x="503" y="35" fill="#DDF8FF" font-size="19" font-family="Inter,Segoe UI,Arial" font-weight="700">Gradio</text>
