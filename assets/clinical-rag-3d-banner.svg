    <path d="M105 171C160 140 219 120 386 101" stroke="#8F7CFF" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M430 138C444 185 465 235 477 280" stroke="#54F0FF" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="8 10"/>
    <path d="M433 339C370 340 322 336 262 325" stroke="#66FFD1" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="8 10"/>
