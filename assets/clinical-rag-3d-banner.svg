    <g filter="url(#smallShadow)">
      <circle cx="448" cy="88" r="58" fill="#122E54" stroke="#54F0FF" stroke-width="2"/>
      <circle cx="448" cy="88" r="43" fill="#0C203D"/>
      <path d="M425 94C434 70 460 64 474 78C486 91 479 111 461 117C441 123 419 111 425 94Z" fill="url(#cyan)" opacity="0.9"/>
      <circle cx="431" cy="80" r="5" fill="#F4FBFF"/><circle cx="463" cy="98" r="5" fill="#F4FBFF"/>
      <path d="M435 83L458 95" stroke="#F4FBFF" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g filter="url(#smallShadow)">
