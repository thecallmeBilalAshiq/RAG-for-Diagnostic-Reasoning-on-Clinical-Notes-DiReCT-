    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="#8DC7FF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" rx="42" fill="url(#bg)"/>
  <rect width="1600" height="700" rx="42" fill="url(#grid)"/>
  <rect width="1600" height="700" rx="42" fill="url(#glow1)"/>
  <rect width="1600" height="700" rx="42" fill="url(#glow2)"/>

  <g opacity="0.8">
