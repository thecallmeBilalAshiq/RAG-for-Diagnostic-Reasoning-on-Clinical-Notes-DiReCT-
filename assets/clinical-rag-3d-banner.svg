      <path d="M34 160L54 145L74 160L54 175L34 160Z" fill="url(#violet)"/>
      <path d="M34 169L54 184L74 169" stroke="#C9BDFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g filter="url(#smallShadow)">
      <circle cx="486" cy="332" r="50" fill="#122E54" stroke="#66FFD1" stroke-width="2"/>
      <rect x="461" y="310" width="50" height="44" rx="9" fill="#0B213E" stroke="#66FFD1"/>
      <path d="M471 323H501M471 333H497M471 343H489" stroke="#66FFD1" stroke-width="4" stroke-linecap="round"/>
    </g>

