  <text x="110" y="648" fill="#6887AA" font-size="17" font-family="Inter,Segoe UI,Arial" letter-spacing="1.2">ACADEMIC RESEARCH PROJECT · NATURAL LANGUAGE PROCESSING · CLINICAL INFORMATION RETRIEVAL</text>
