<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="30" x2="1480" y2="670" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06142D"/>
      <stop offset="0.5" stop-color="#102A56"/>
      <stop offset="1" stop-color="#08182E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 145) rotate(137) scale(540 410)">
      <stop stop-color="#18D8FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#18D8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 660) rotate(-45) scale(500 310)">
      <stop stop-color="#7C5CFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#54F0FF"/><stop offset="1" stop-color="#17A9FF"/>
